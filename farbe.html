<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquarell-Farbmischer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #0f3460;
            --text: #e0e0e0;
            --highlight: #e94560;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.8em;
            color: #fff;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .input-section {
            max-width: 700px;
            margin: 0 auto 30px;
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .input-row {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 120px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85em;
            color: #aaa;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input[type="number"] {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #0d1117;
            color: #fff;
            font-size: 1.1em;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input[type="number"]:focus {
            border-color: var(--highlight);
        }

        .color-input-group {
            min-width: 80px;
            flex: 0;
        }

        .color-input-group input[type="color"] {
            width: 60px;
            height: 44px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #0d1117;
            cursor: pointer;
            padding: 2px;
        }

        .btn {
            padding: 10px 28px;
            background: var(--highlight);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.05em;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn:hover { background: #c73a52; }

        .separator {
            text-align: center;
            color: #555;
            margin: 12px 0;
            font-size: 0.85em;
        }

        .result-section {
            max-width: 700px;
            margin: 0 auto;
            display: none;
        }

        .result-section.visible { display: block; }

        .preview-bar {
            display: flex;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            height: 80px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .preview-target {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9em;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .preview-mixed {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9em;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .recipe-card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .recipe-card h2 {
            font-size: 1.15em;
            margin-bottom: 14px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .step-number {
            background: var(--highlight);
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85em;
            flex-shrink: 0;
        }

        .pigment-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .pigment-swatch {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.15);
            flex-shrink: 0;
        }

        .pigment-info { flex: 1; }

        .pigment-name {
            font-weight: 700;
            color: #fff;
            font-size: 0.95em;
        }

        .pigment-code {
            font-size: 0.8em;
            color: #888;
            font-family: 'Consolas', monospace;
        }

        .pigment-amount {
            font-weight: 700;
            font-size: 1.2em;
            color: var(--highlight);
            min-width: 50px;
            text-align: right;
        }

        .info-text {
            font-size: 0.9em;
            color: #bbb;
            line-height: 1.6;
            margin-top: 8px;
        }

        .info-text strong { color: #fff; }

        .water-bar {
            margin-top: 12px;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 14px;
        }

        .water-visual {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .water-drops {
            font-size: 1.4em;
            letter-spacing: 2px;
        }

        .water-ratio {
            font-weight: 700;
            color: #5bc0de;
        }

        .warning {
            background: rgba(233, 69, 96, 0.15);
            border-left: 3px solid var(--highlight);
            padding: 12px 16px;
            border-radius: 0 10px 10px 0;
            margin-top: 12px;
            font-size: 0.9em;
        }

        .palette-section {
            max-width: 700px;
            margin: 30px auto 0;
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .palette-section h2 {
            font-size: 1.1em;
            margin-bottom: 14px;
            color: #fff;
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px;
        }

        .palette-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            font-size: 0.8em;
            cursor: pointer;
            transition: background 0.15s;
        }

        .palette-item:hover {
            background: rgba(255,255,255,0.08);
        }

        .palette-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }

        .palette-label {
            color: #ccc;
            line-height: 1.2;
        }

        .palette-label small {
            color: #777;
            font-family: 'Consolas', monospace;
        }

        @media (max-width: 500px) {
            .input-row { flex-direction: column; }
            .palette-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<h1>🎨 Aquarell-Farbmischer</h1>
<p class="subtitle">HSL/Hex-Wert eingeben → Mischrezept mit 24 Einzelpigment-Farben</p>

<div class="input-section">
    <div class="input-row">
        <div class="input-group">
            <label>H (Farbton 0–360°)</label>
            <input type="number" id="inputH" min="0" max="360" value="160" step="1">
        </div>
        <div class="input-group">
            <label>S (Sättigung 0–100%)</label>
            <input type="number" id="inputS" min="0" max="100" value="65" step="1">
        </div>
        <div class="input-group">
            <label>L (Helligkeit 0–100%)</label>
            <input type="number" id="inputL" min="0" max="100" value="50" step="1">
        </div>
        <div>
            <label style="display:block;margin-bottom:6px;font-size:0.85em;color:#aaa;">&nbsp;</label>
            <button class="btn" onclick="calculate()">Mischen!</button>
        </div>
    </div>

    <div class="separator">— oder —</div>

    <div class="input-row">
        <div class="color-input-group">
            <label>Farbwähler</label>
            <input type="color" id="inputColor" value="#2E8B57">
        </div>
        <div>
            <label style="display:block;margin-bottom:6px;font-size:0.85em;color:#aaa;">&nbsp;</label>
            <button class="btn" onclick="calculateFromPicker()">Mischen!</button>
        </div>
    </div>
</div>

<div class="result-section" id="resultSection">
    <div class="preview-bar" id="previewBar">
        <div class="preview-target" id="previewTarget">Zielfarbe</div>
        <div class="preview-mixed" id="previewMixed">Ergebnis (ca.)</div>
    </div>

    <div id="recipeOutput"></div>
</div>

<div class="palette-section">
    <h2>📋 Deine Van Gogh Palette (25 Farben)</h2>
    <div class="palette-grid" id="paletteGrid"></div>
</div>

<script>
const PALETTE = [
    // --- Gelb ---
    { id: "VG254", name: "Perm. Lemon Yellow",       hue: 56,  sat: 88, light: 72, hex: "#F0E040", pigment: "PY184" },
    { id: "VG272", name: "Transparent Yellow Med.",   hue: 46,  sat: 82, light: 62, hex: "#DEB030", pigment: "PY128" },
    { id: "VG244", name: "Indian Yellow",             hue: 40,  sat: 78, light: 52, hex: "#D49820", pigment: "PY83"  },
    { id: "VG227", name: "Yellow Ochre",              hue: 38,  sat: 50, light: 50, hex: "#BF9640", pigment: "PY42"  },
    { id: "VG296", name: "Azomethine Green Yellow",   hue: 95,  sat: 55, light: 48, hex: "#7EA830", pigment: "PY129" },
    // --- Orange ---
    { id: "VG278", name: "Pyrrole Orange",            hue: 22,  sat: 88, light: 52, hex: "#E86820", pigment: "PO73"  },
    // --- Rot ---
    { id: "VG370", name: "Permanent Red Light",       hue: 5,   sat: 82, light: 48, hex: "#D83828", pigment: "PR255" },
    { id: "VG371", name: "Permanent Red Deep",        hue: 0,   sat: 62, light: 32, hex: "#842020", pigment: "PR149" },
    { id: "VG331", name: "Madder Lake Deep",          hue: 348, sat: 58, light: 30, hex: "#782030", pigment: "PR264" },
    { id: "VG339", name: "Light Oxide Red",           hue: 12,  sat: 48, light: 42, hex: "#9E5838", pigment: "PR101" },
    // --- Rosa / Magenta ---
    { id: "VG366", name: "Quinacridone Rose",         hue: 340, sat: 70, light: 44, hex: "#C03058", pigment: "PV19"  },
    { id: "VG567", name: "Perm. Red Violet",          hue: 330, sat: 62, light: 38, hex: "#9C2860", pigment: "PV19"  },
    // --- Violett / Purpur ---
    { id: "VG592", name: "Quin. Purple Red",          hue: 318, sat: 52, light: 34, hex: "#842858", pigment: "PV55"  },
    { id: "VG593", name: "Quin. Purple Blue",         hue: 300, sat: 48, light: 28, hex: "#6A2068", pigment: "PV55"  },
    { id: "VG568", name: "Perm. Blue Violet",         hue: 278, sat: 68, light: 22, hex: "#381068", pigment: "PV23"  },
    // --- Blau ---
    { id: "VG506", name: "Ultramarine Deep",          hue: 238, sat: 72, light: 38, hex: "#2028A0", pigment: "PB29"  },
    { id: "VG570", name: "Phthalo Blue",              hue: 215, sat: 88, light: 28, hex: "#084080", pigment: "PB15"  },
    { id: "VG508", name: "Prussian Blue",             hue: 208, sat: 72, light: 20, hex: "#0E3050", pigment: "PB27"  },
    // --- Türkis ---
    { id: "VG522", name: "Turquoise Blue",            hue: 188, sat: 78, light: 35, hex: "#148078", pigment: "PB15+PG7" },
    // --- Grün ---
    { id: "VG633", name: "Perm. Yellowish Green",     hue: 135, sat: 62, light: 42, hex: "#30A848", pigment: "PY154+PG7" },
    { id: "VG675", name: "Phthalo Green",             hue: 160, sat: 88, light: 25, hex: "#086040", pigment: "PG7"   },
    // --- Erdtöne ---
    { id: "VG411", name: "Burnt Sienna",              hue: 18,  sat: 55, light: 35, hex: "#8A4820", pigment: "PR101" },
    { id: "VG409", name: "Burnt Umber",               hue: 25,  sat: 42, light: 22, hex: "#503018", pigment: "PBr7"  },
    // --- Schwarz & Weiß ---
    { id: "VG735", name: "Oxide Black",               hue: 0,   sat: 0,  light: 8,  hex: "#181818", pigment: "PBk11" },
    { id: "VG106", name: "Opaque White",              hue: 0,   sat: 0,  light: 97, hex: "#F8F8F8", pigment: "PW6"   },
];

function hueDistance(h1, h2) {
    let d = Math.abs(h1 - h2);
    return d > 180 ? 360 - d : d;
}

function getContrastColor(h, s, l) {
    return l > 55 ? "#1a1a2e" : "#ffffff";
}

function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const a = s * Math.min(l, 1 - l);
    const f = n => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * color).toString(16).padStart(2, '0');
    };
    return `#${f(0)}${f(8)}${f(4)}`;
}

function hexToHsl(hex) {
    hex = hex.replace('#', '');
    const r = parseInt(hex.substr(0, 2), 16) / 255;
    const g = parseInt(hex.substr(2, 2), 16) / 255;
    const b = parseInt(hex.substr(4, 2), 16) / 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h, s, l = (max + min) / 2;
    if (max === min) {
        h = s = 0;
    } else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
            case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
            case g: h = ((b - r) / d + 2) / 6; break;
            case b: h = ((r - g) / d + 4) / 6; break;
        }
        h *= 360;
    }
    return { h: Math.round(h), s: Math.round(s * 100), l: Math.round(l * 100) };
}

function teileLabel(n) {
    return n === 1 ? "1 Teil" : n + " Teile";
}

// ===================== KUBELKA-MUNK CORE =====================

function hslToRgb(h, s, l) {
    const sn = s / 100, ln = l / 100;
    const a = sn * Math.min(ln, 1 - ln);
    const f = n => {
        const k = (n + h / 30) % 12;
        return ln - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    };
    return { r: Math.round(f(0) * 255), g: Math.round(f(8) * 255), b: Math.round(f(4) * 255) };
}

function rgbToHsl(r, g, b) {
    const rn = r / 255, gn = g / 255, bn = b / 255;
    const max = Math.max(rn, gn, bn), min = Math.min(rn, gn, bn);
    let h = 0, s = 0, l = (max + min) / 2;
    if (max !== min) {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        if (max === rn) h = ((gn - bn) / d + (gn < bn ? 6 : 0)) / 6;
        else if (max === gn) h = ((bn - rn) / d + 2) / 6;
        else h = ((rn - gn) / d + 4) / 6;
        h *= 360;
    }
    return { h: Math.round(h), s: Math.round(s * 100), l: Math.round(l * 100) };
}

function rgbToKS(r, g, b) {
    const rn = Math.max(0.001, r / 255);
    const gn = Math.max(0.001, g / 255);
    const bn = Math.max(0.001, b / 255);
    return {
        k1: (1 - rn) * (1 - rn) / (2 * rn),
        k2: (1 - gn) * (1 - gn) / (2 * gn),
        k3: (1 - bn) * (1 - bn) / (2 * bn)
    };
}

function ksToRgb(k1, k2, k3) {
    const r = 1 + k1 - Math.sqrt(k1 * k1 + 2 * k1);
    const g = 1 + k2 - Math.sqrt(k2 * k2 + 2 * k2);
    const b = 1 + k3 - Math.sqrt(k3 * k3 + 2 * k3);
    return {
        r: Math.round(Math.max(0, Math.min(1, r)) * 255),
        g: Math.round(Math.max(0, Math.min(1, g)) * 255),
        b: Math.round(Math.max(0, Math.min(1, b)) * 255)
    };
}

function rgbToLab(r, g, b) {
    let rn = r / 255, gn = g / 255, bn = b / 255;
    rn = rn > 0.04045 ? Math.pow((rn + 0.055) / 1.055, 2.4) : rn / 12.92;
    gn = gn > 0.04045 ? Math.pow((gn + 0.055) / 1.055, 2.4) : gn / 12.92;
    bn = bn > 0.04045 ? Math.pow((bn + 0.055) / 1.055, 2.4) : bn / 12.92;
    let x = rn * 0.4124564 + gn * 0.3575761 + bn * 0.1804375;
    let y = rn * 0.2126729 + gn * 0.7151522 + bn * 0.0721750;
    let z = rn * 0.0193339 + gn * 0.1191920 + bn * 0.9503041;
    x /= 0.95047; y /= 1.00000; z /= 1.08883;
    const eps = 0.008856, kap = 903.3;
    x = x > eps ? Math.pow(x, 1.0 / 3.0) : (kap * x + 16) / 116;
    y = y > eps ? Math.pow(y, 1.0 / 3.0) : (kap * y + 16) / 116;
    z = z > eps ? Math.pow(z, 1.0 / 3.0) : (kap * z + 16) / 116;
    return { L: 116 * y - 16, a: 500 * (x - y), b: 200 * (y - z) };
}

function deltaE76(lab1, lab2) {
    const dL = lab1.L - lab2.L, da = lab1.a - lab2.a, db = lab1.b - lab2.b;
    return Math.sqrt(dL * dL + da * da + db * db);
}

// ===================== OPTIMIZER =====================

function normalizeWeights(x) {
    let sum = 0;
    const w = x.slice();
    for (let i = 0; i < w.length; i++) { if (w[i] < 0) w[i] = 0; sum += w[i]; }
    if (sum <= 0) { w[0] = 1; for (let i = 1; i < w.length; i++) w[i] = 0; return w; }
    for (let i = 0; i < w.length; i++) w[i] /= sum;
    return w;
}

function optimizeDilution(mixK1, mixK2, mixK3, targetLab) {
    let bestD = 0, bestDE = 999, bestRgb = null;
    for (let d = 0.0; d <= 1.001; d += 0.1) {
        const rgb = ksToRgb(mixK1 * d, mixK2 * d, mixK3 * d);
        const de = deltaE76(targetLab, rgbToLab(rgb.r, rgb.g, rgb.b));
        if (de < bestDE) { bestDE = de; bestD = d; bestRgb = rgb; }
    }
    const lo = Math.max(0, bestD - 0.1), hi = Math.min(1, bestD + 0.1);
    for (let d = lo; d <= hi + 0.001; d += 0.01) {
        const rgb = ksToRgb(mixK1 * d, mixK2 * d, mixK3 * d);
        const de = deltaE76(targetLab, rgbToLab(rgb.r, rgb.g, rgb.b));
        if (de < bestDE) { bestDE = de; bestD = d; bestRgb = rgb; }
    }
    const lo2 = Math.max(0, bestD - 0.01), hi2 = Math.min(1, bestD + 0.01);
    for (let d = lo2; d <= hi2 + 0.0001; d += 0.001) {
        const rgb = ksToRgb(mixK1 * d, mixK2 * d, mixK3 * d);
        const de = deltaE76(targetLab, rgbToLab(rgb.r, rgb.g, rgb.b));
        if (de < bestDE) { bestDE = de; bestD = d; bestRgb = rgb; }
    }
    return { d: bestD, deltaE: bestDE, rgb: bestRgb };
}

function evalRecipe(paletteKS, indices, x, targetLab) {
    const w = normalizeWeights(x);
    let mixK1 = 0, mixK2 = 0, mixK3 = 0;
    for (let j = 0; j < indices.length; j++) {
        mixK1 += w[j] * paletteKS[indices[j]].k1;
        mixK2 += w[j] * paletteKS[indices[j]].k2;
        mixK3 += w[j] * paletteKS[indices[j]].k3;
    }
    const dil = optimizeDilution(mixK1, mixK2, mixK3, targetLab);
    return { deltaE: dil.deltaE, d: dil.d, w, mixK1, mixK2, mixK3, rgb: dil.rgb };
}

function optimizeWeights(paletteKS, indices, initX, targetLab) {
    const n = indices.length;
    const x = initX.slice();
    let bestDE = evalRecipe(paletteKS, indices, x, targetLab).deltaE;
    const factors = [0.0, 0.3, 0.7, 1.5, 3.0];
    for (let iter = 0; iter < 15; iter++) {
        let improved = false;
        for (let i = 0; i < n; i++) {
            let origX = x[i];
            for (const f of factors) {
                x[i] = origX * f;
                const de = evalRecipe(paletteKS, indices, x, targetLab).deltaE;
                if (de < bestDE - 0.005) { bestDE = de; origX = x[i]; improved = true; }
                else x[i] = origX;
            }
            for (const av of [0.01, 0.1, 0.5]) {
                x[i] = av;
                const de = evalRecipe(paletteKS, indices, x, targetLab).deltaE;
                if (de < bestDE - 0.005) { bestDE = de; origX = x[i]; improved = true; }
                else x[i] = origX;
            }
        }
        if (!improved) break;
    }
    return x;
}

function findBestRecipe(targetH, targetS, targetL, maxPigments) {
    if (!maxPigments) maxPigments = 5;
    const targetRgb = hslToRgb(targetH, targetS, targetL);
    const targetLab = rgbToLab(targetRgb.r, targetRgb.g, targetRgb.b);

    const paletteKS = PALETTE.map(p => {
        const rgb = hslToRgb(p.hue, p.sat, p.light);
        return rgbToKS(rgb.r, rgb.g, rgb.b);
    });

    // Find index of Oxide Black (VG735)
    let blackIdx = -1;
    for (let i = 0; i < PALETTE.length; i++) {
        if (PALETTE[i].id === "VG735") { blackIdx = i; break; }
    }

    // Build sorted list of chromatic pigments (exclude White and Black)
    const chromatic = [];
    for (let i = 0; i < PALETTE.length; i++) {
        if (PALETTE[i].sat === 0) continue;
        chromatic.push({ idx: i, hue: PALETTE[i].hue });
    }
    chromatic.sort((a, b) => a.hue - b.hue);

    // Find hue neighbors: two chromatic pigments that bracket targetH on the color wheel
    function findHueNeighbors(th) {
        if (chromatic.length === 0) return [];
        let leftIdx = -1, rightIdx = -1;
        let leftDist = 999, rightDist = 999;
        for (let i = 0; i < chromatic.length; i++) {
            // Signed angular distance: positive = pigment is clockwise from target
            let diff = (chromatic[i].hue - th + 360) % 360;
            if (diff > 180) diff -= 360;
            if (diff <= 0 && (-diff) < leftDist) { leftDist = -diff; leftIdx = i; }
            if (diff >= 0 && diff < rightDist) { rightDist = diff; rightIdx = i; }
        }
        // Wrap around: if no left neighbor, use last; if no right, use first
        if (leftIdx < 0) leftIdx = chromatic.length - 1;
        if (rightIdx < 0) rightIdx = 0;
        if (chromatic[leftIdx].idx === chromatic[rightIdx].idx) return [chromatic[leftIdx].idx];
        return [chromatic[leftIdx].idx, chromatic[rightIdx].idx];
    }

    // Find complementary pigment (nearest to targetH + 180°)
    function findComplement(th) {
        const compHue = (th + 180) % 360;
        let bestIdx = -1, bestDist = 999;
        for (let i = 0; i < chromatic.length; i++) {
            const d = hueDistance(chromatic[i].hue, compHue);
            if (d < bestDist) { bestDist = d; bestIdx = i; }
        }
        return bestIdx >= 0 ? chromatic[bestIdx].idx : -1;
    }

    // Try a candidate set: optimize weights and return { selected, x, deltaE }
    function tryCandidate(indices) {
        const initX = [];
        for (let i = 0; i < indices.length; i++) initX.push(1.0);
        const optX = optimizeWeights(paletteKS, indices, initX, targetLab);
        const res = evalRecipe(paletteKS, indices, optX, targetLab);
        return { selected: indices, x: optX, deltaE: res.deltaE };
    }

    let globalBestDE = 999, globalBestSelected = [], globalBestX = [];

    function countEffective(indices, x) {
        const w = normalizeWeights(x);
        let count = 0;
        for (let i = 0; i < w.length; i++) {
            if (w[i] > 0.005) count++;
        }
        return count;
    }

    function updateBest(candidate) {
        if (globalBestDE >= 999) {
            globalBestDE = candidate.deltaE;
            globalBestSelected = candidate.selected.slice();
            globalBestX = candidate.x.slice();
            return;
        }
        const newCount = countEffective(candidate.selected, candidate.x);
        const oldCount = countEffective(globalBestSelected, globalBestX);
        // Prefer simpler recipe if dE difference is small (< 3 = visually similar)
        if (newCount < oldCount && candidate.deltaE < globalBestDE + 3.0) {
            globalBestDE = candidate.deltaE;
            globalBestSelected = candidate.selected.slice();
            globalBestX = candidate.x.slice();
        } else if (candidate.deltaE < globalBestDE) {
            globalBestDE = candidate.deltaE;
            globalBestSelected = candidate.selected.slice();
            globalBestX = candidate.x.slice();
        }
    }

    // Find the N closest chromatic pigments by hue distance
    function findClosestByHue(th, count) {
        const ranked = [];
        for (let i = 0; i < chromatic.length; i++) {
            ranked.push({ idx: chromatic[i].idx, dist: hueDistance(chromatic[i].hue, th) });
        }
        ranked.sort((a, b) => a.dist - b.dist);
        const result = [];
        for (let i = 0; i < Math.min(count, ranked.length); i++) {
            result.push(ranked[i].idx);
        }
        return result;
    }

    if (targetS <= 5) {
        // Achromatic target: use Black only (dilution handles lightness)
        if (blackIdx >= 0) updateBest(tryCandidate([blackIdx]));
    } else {
        const neighbors = findHueNeighbors(targetH);
        const compIdx = findComplement(targetH);
        const closest4 = findClosestByHue(targetH, 4);

        // Strategy 1: Both hue neighbors
        if (neighbors.length >= 2) {
            updateBest(tryCandidate(neighbors.slice()));
        }

        // Strategy 2: Both hue neighbors + complementary (desaturation)
        if (neighbors.length >= 2 && compIdx >= 0 && neighbors.indexOf(compIdx) < 0) {
            const set2 = neighbors.slice();
            set2.push(compIdx);
            updateBest(tryCandidate(set2));
        }

        // Strategy 3: Both hue neighbors + complementary + Black (dark desaturated)
        if (neighbors.length >= 2 && compIdx >= 0 && blackIdx >= 0 && neighbors.indexOf(compIdx) < 0) {
            const set3 = neighbors.slice();
            set3.push(compIdx);
            if (set3.indexOf(blackIdx) < 0) set3.push(blackIdx);
            updateBest(tryCandidate(set3));
        }

        // Strategy 4: Single nearest-hue pigment (direct hit)
        if (neighbors.length > 0) {
            updateBest(tryCandidate([neighbors[0]]));
            if (neighbors.length >= 2) updateBest(tryCandidate([neighbors[1]]));
        }

        // Strategy 5: Hue neighbors + Black (dark chromatic without complement)
        if (neighbors.length >= 2 && blackIdx >= 0 && neighbors.indexOf(blackIdx) < 0) {
            const set5 = neighbors.slice();
            set5.push(blackIdx);
            updateBest(tryCandidate(set5));
        }

        // Strategy 6: Single neighbor + complementary
        for (let ni = 0; ni < neighbors.length; ni++) {
            if (compIdx >= 0 && neighbors[ni] !== compIdx) {
                updateBest(tryCandidate([neighbors[ni], compIdx]));
            }
        }

        // Strategy 7: Top-4 closest hue pigments (covers palette gaps and clustered hues)
        if (closest4.length >= 2) {
            updateBest(tryCandidate(closest4.slice()));
            if (compIdx >= 0 && closest4.indexOf(compIdx) < 0 && closest4.length < maxPigments) {
                const set7c = closest4.slice();
                set7c.push(compIdx);
                updateBest(tryCandidate(set7c));
            }
            if (blackIdx >= 0 && closest4.indexOf(blackIdx) < 0 && closest4.length < maxPigments) {
                const set7b = closest4.slice();
                set7b.push(blackIdx);
                updateBest(tryCandidate(set7b));
            }
        }

        // Strategy 8: Each of top-4 individually (some palette pigments are near-direct hits)
        for (let ci = 0; ci < closest4.length; ci++) {
            updateBest(tryCandidate([closest4[ci]]));
            if (blackIdx >= 0 && closest4[ci] !== blackIdx) {
                updateBest(tryCandidate([closest4[ci], blackIdx]));
            }
        }
    }

    const finalRes = evalRecipe(paletteKS, globalBestSelected, globalBestX, targetLab);
    const finalW = finalRes.w;
    const pigmentFrac = finalRes.d;

    const resultPigments = [];
    for (let j = 0; j < globalBestSelected.length; j++) {
        if (finalW[j] > 0.005) {
            resultPigments.push({ palette: PALETTE[globalBestSelected[j]], weight: finalW[j] });
        }
    }

    const mixRgb = finalRes.rgb;
    const mixHsl = rgbToHsl(mixRgb.r, mixRgb.g, mixRgb.b);

    let maxW = 0;
    for (const p of resultPigments) { if (p.weight > maxW) maxW = p.weight; }
    for (const p of resultPigments) { p.teile = Math.max(1, Math.round(p.weight / maxW * 10)); }

    return { pigments: resultPigments, deltaE: globalBestDE, pigmentFrac, mixRgb, mixHsl, targetRgb, targetLab };
}

function computeMixedColor(h, s, l) {
    const recipe = findBestRecipe(h, s, l);
    const pigmentFrac = recipe.pigmentFrac;
    let waterNum, waterRatio;
    if (pigmentFrac >= 0.95) { waterNum = 0; waterRatio = "pur"; }
    else if (pigmentFrac > 0.01) {
        waterNum = (1.0 - pigmentFrac) / pigmentFrac;
        if (waterNum <= 0.75) waterRatio = "1:0.5";
        else if (waterNum <= 2.0) waterRatio = "1:1.5";
        else if (waterNum <= 4.0) waterRatio = "1:3";
        else if (waterNum <= 6.5) waterRatio = "1:5";
        else waterRatio = "1:8+";
    } else { waterNum = 10; waterRatio = "1:8+"; }

    return { h: recipe.mixHsl.h, s: recipe.mixHsl.s, l: recipe.mixHsl.l,
             rgb: recipe.mixRgb, pigments: recipe.pigments, waterRatio, waterNum,
             pigmentFrac, deltaE: recipe.deltaE, recipe };
}

function calculate() {
    const hRaw = parseInt(document.getElementById('inputH').value);
    const sRaw = parseInt(document.getElementById('inputS').value);
    const lRaw = parseInt(document.getElementById('inputL').value);
    const h = isNaN(hRaw) ? 0 : hRaw;
    const s = isNaN(sRaw) ? 0 : sRaw;
    const l = isNaN(lRaw) ? 50 : lRaw;
    generateRecipe(h, s, l);
}

function calculateFromPicker() {
    const hex = document.getElementById('inputColor').value;
    const hsl = hexToHsl(hex);
    document.getElementById('inputH').value = hsl.h;
    document.getElementById('inputS').value = hsl.s;
    document.getElementById('inputL').value = hsl.l;
    generateRecipe(hsl.h, hsl.s, hsl.l);
}

function generateRecipe(h, s, l) {
    const resultSection = document.getElementById('resultSection');
    resultSection.classList.add('visible');

    const targetHex = hslToHex(h, s, l);
    const targetContrast = getContrastColor(h, s, l);

    document.getElementById('previewTarget').style.background = targetHex;
    document.getElementById('previewTarget').style.color = targetContrast;
    document.getElementById('previewTarget').textContent = `Ziel: HSL(${h}°, ${s}%, ${l}%)`;

    const result = computeMixedColor(h, s, l);

    let html = '';

    // --- Step 1: Pigment recipe ---
    html += `<div class="recipe-card">`;
    html += `<h2><span class="step-number">1</span> Farbmischung (Hue ${h}°, S=${s}%, L=${l}%)</h2>`;

    html += `<div class="info-text">
        K/S-Optimizer: ΔE = ${result.deltaE.toFixed(1)}
    </div>`;

    for (const p of result.pigments) {
        html += renderPigmentRow(p.palette, teileLabel(p.teile),
            `Hue ${p.palette.hue}° · ${p.palette.pigment || ''}`);
    }

    html += `<div class="info-text">
        Mische alle Pigmente im angegebenen Verhältnis.
    </div>`;
    html += `</div>`;

    // --- Step 2: Water dilution ---
    html += `<div class="recipe-card">`;
    html += `<h2><span class="step-number">2</span> Verdünnung</h2>`;

    let waterDrops;
    if (result.waterRatio === "pur") waterDrops = "";
    else if (result.waterRatio === "1:0.5") waterDrops = "💧";
    else if (result.waterRatio === "1:1.5") waterDrops = "💧💧";
    else if (result.waterRatio === "1:3") waterDrops = "💧💧💧";
    else if (result.waterRatio === "1:5") waterDrops = "💧💧💧💧💧";
    else waterDrops = "💧💧💧💧💧💧💧💧";

    let waterText;
    if (result.waterRatio === "pur") waterText = "Pur auftragen — kein Verdünnen.";
    else if (result.pigmentFrac > 0.7) waterText = "Wenig Wasser — deckender Auftrag.";
    else if (result.pigmentFrac > 0.3) waterText = "Moderate Verdünnung — mittlere Intensität.";
    else if (result.pigmentFrac > 0.1) waterText = "Stark verdünnen — helle, transparente Schicht.";
    else waterText = "Sehr stark verdünnen — hauchzarte Lasur.";

    html += `<div class="water-bar">
        <div class="water-visual">
            <span class="water-drops">${waterDrops}</span>
            <div>
                <div class="water-ratio">Farbe : Wasser = ${result.waterRatio}</div>
                <div style="color:#888;font-size:0.85em;margin-top:2px;">${waterText}</div>
            </div>
        </div>
    </div>`;

    html += `<div class="warning">
        ⚠️ <strong>Aquarell trocknet 10–15% heller!</strong>
        Mische etwas dunkler als dein Ziel-Lightness. Statt L=${l}% mische für ca. L=${Math.max(0, l - 12)}%.
    </div>`;
    html += `</div>`;

    // --- Summary ---
    html += `<div class="recipe-card">`;
    html += `<h2><span class="step-number">✓</span> Zusammenfassung</h2>`;

    const summaryParts = result.pigments.map(p =>
        `<strong>${p.palette.name}</strong> (${p.palette.id}) — ${teileLabel(p.teile)}`
    );

    html += `<div class="info-text" style="font-size:1em;line-height:1.8;">
        ${summaryParts.join('<br>')}
        <br>Verdünnung: <strong>${result.waterRatio}</strong> (Farbe:Wasser)
        <br><br>
        <span style="color:#888;">Hex: ${targetHex.toUpperCase()} → HSL(${h}°, ${s}%, ${l}%)</span>
    </div>`;
    html += `</div>`;

    document.getElementById('recipeOutput').innerHTML = html;

    // Mixed color preview from K/S simulation
    const mixedHex = hslToHex(result.h, result.s, result.l);
    const mixedContrast = getContrastColor(result.h, result.s, result.l);
    document.getElementById('previewMixed').style.background = mixedHex;
    document.getElementById('previewMixed').style.color = mixedContrast;
    document.getElementById('previewMixed').textContent = `Ergebnis: HSL(${result.h}°, ${result.s}%, ${result.l}%)`;

    resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderPigmentRow(pigment, amount, detail) {
    const label = pigment.pigment ? `${pigment.id} (${pigment.pigment})` : pigment.id;
    return `<div class="pigment-row">
        <div class="pigment-swatch" style="background:${pigment.hex};"></div>
        <div class="pigment-info">
            <div class="pigment-name">${pigment.name}</div>
            <div class="pigment-code">${label} · ${detail || 'Hue ' + pigment.hue + '°'}</div>
        </div>
        <div class="pigment-amount">${amount}</div>
    </div>`;
}

// Render palette grid
function renderPalette() {
    const grid = document.getElementById('paletteGrid');
    grid.innerHTML = PALETTE.map(p => `
        <div class="palette-item" onclick="quickSelect(${p.hue}, ${p.sat}, ${p.light})"
             title="HSL(${p.hue}°, ${p.sat}%, ${p.light}%)">
            <div class="palette-dot" style="background:${p.hex};"></div>
            <div class="palette-label">
                ${p.name}<br>
                <small>${p.id} · ${p.pigment || ''}</small>
            </div>
        </div>
    `).join('');
}

function quickSelect(h, s, l) {
    document.getElementById('inputH').value = h;
    document.getElementById('inputS').value = s;
    document.getElementById('inputL').value = l;
    calculate();
}

// Enter key support
['inputH', 'inputS', 'inputL'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') calculate();
    });
});

renderPalette();
</script>
